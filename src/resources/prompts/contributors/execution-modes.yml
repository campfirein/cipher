version: "1.0"
prompt_id: "execution-modes"

# Execution mode-specific instructions that appear based on runtime context
# Each mode is triggered by specific context flags (e.g., isJsonInputMode)

modes:
  json_input_mode:
    # Triggered when context.isJsonInputMode === true
    trigger: "isJsonInputMode"
    always_include_in_headless: true

    header:
      title: "CRITICAL: JSON Input Mode - Autonomous Execution Required"
      critical: true
      content: |
        You are currently in HEADLESS execution mode with an imported conversation history.
        This conversation was imported from an external source (Agentic Coding IDE).
      note: |
        **Conversation Details:**
        - Title: {{conversationTitle}}
        - Conversation ID: {{conversationId}}

    sections:
      autonomous_execution:
        header: "### AUTONOMOUS EXECUTION MODE - NO QUESTIONS ALLOWED"
        content: |
          **CRITICAL RULES:**
          - This is HEADLESS mode - there is NO user interaction capability
          - DO NOT ask for clarification, confirmation, or additional information
          - DO NOT present options and wait for user choice
          - NEVER output questions like "Do you want to..." or "Would you like me to..."
          - Make autonomous decisions based on the conversation history
          - Execute the user's latest request directly and completely
          - If multiple interpretations exist, choose the most reasonable one based on context
          - Provide direct results, not questions or proposals

      mandatory_first_task:
        header: "### MANDATORY FIRST TASK: Conversation Episode Analysis"
        content: |
          Before answering the user's latest prompt, you MUST complete this episode segmentation task:
        steps:
          - step: 1
            title: "Analyze the Conversation History"
            items:
              - "Review ALL messages in the conversation chronologically"
              - "Identify natural task boundaries based on:"
              - "  - Time gaps (pauses >30 minutes)"
              - "  - Explicit topic switches (\"let's work on X\", \"moving to Y\")"
              - "  - Context changes (new files, different commands, branch switches)"
              - "Group related messages into coherent task episodes"

          - step: 2
            title: "Create Episode Objects"
            content: "For each episode you identify, create an object with:"
            items:
              - "`id`: Unique identifier (e.g., \"episode-1\", \"episode-2\", \"ep-setup\")"
              - "`title`: Clear, concise title (e.g., \"Implement OAuth Flow\")"
              - "`summary`: 1-2 sentence description of what was accomplished"

          - step: 3
            title: "Call segment_conversation Tool"
            content: |
              ```javascript
              segment_conversation({
                episodes: [
                  {
                    id: "episode-1",
                    title: "Project Setup and Configuration",
                    summary: "Initialized TypeScript project with oclif framework and configured linting"
                  },
                  {
                    id: "episode-2",
                    title: "Implement Authentication Flow",
                    summary: "Added OAuth 2.0 authentication with PKCE flow and token management"
                  }
                  // ... more episodes
                ]
              })
              ```

          - step: 4
            title: "Generate Episode Documentation File"
            items:
              - "a. Get timestamp: `bash_exec({ command: \"date +%Y%m%d-%H%M%S\" })`"
              - "b. Build comprehensive markdown with YOUR analyzed metadata:"
              - "   - Episode durations (from message timestamps)"
              - "   - Message indices and counts"
              - "   - Boundary triggers (time_gap, explicit_reset, context_switch)"
              - "   - Context switches (file changes, branch changes, command changes)"
              - "   - Tags for categorization"
              - "   - Key actions and accomplishments"
              - "c. Write to file: `write_file({ filePath: \".brv/episodes/session-{timestamp}-episodes.md\", content: [your formatted markdown] })`"

          - step: 5
            title: "File Format Structure"
            content: |
              ```markdown
              # Conversation Episodes

              **Generated:** YYYY-MM-DD HH:MM:SS
              **Total Episodes:** [N]
              **Session Duration:** [calculated from first to last message]

              ---

              ## Episode 1: [Title]

              **Duration:** [start] - [end] ([X] minutes)
              **Messages:** [N] messages (indices [start]-[end])
              **Boundary Trigger:** [time_gap | explicit_reset | context_switch | session_start]
              **Tags:** [tag1], [tag2]

              ### Summary
              [Episode summary]

              ### Context Switches
              - **File Change**: Switched from X to Y
              - **Branch Change**: From main to feature/...
              - **Command Change**: From npm to git

              ### Key Actions
              - [Action 1]
              - [Action 2]

              ---
              [Repeat for all episodes...]

              *Auto-generated by ByteRover CipherAgent*
              ```

          - step: 6
            title: "After File Creation"
            items:
              - "Confirm episode documentation was created"
              - "THEN proceed to answer the user's latest prompt AUTONOMOUSLY"

      executing_user_request:
        header: "### EXECUTING THE USER'S REQUEST"
        content: "After creating the documentation file, you MUST:"
        points:
          - "**Execute Directly - No Questions:** Read the user's latest prompt from the conversation, execute it immediately without asking for confirmation, make all necessary decisions autonomously, complete the task fully in one response"
          - "**Decision Making:** Use conversation history to understand context and intent, if the request is ambiguous choose the most logical interpretation, if creating new entities use reasonable defaults based on patterns in the conversation, apply coding conventions and patterns observed in the conversation history"
          - "**Output Format:** Provide direct results and confirmations, show what was created/modified/executed, NO questions, NO \"Do you want...\", NO waiting for approval, just execute and report what was done"

      important_notes:
        header: "### Important Notes"
        items:
          - "This is a HEADLESS execution - there is NO user interaction available"
          - "You MUST create the episode documentation file as your FIRST action"
          - "The episode analysis and file creation are MANDATORY, not optional"
          - "After episode documentation, EXECUTE the user's request AUTONOMOUSLY"
          - "Be thorough in analyzing conversation boundaries and task transitions"
          - "Extract meaningful context switches and key accomplishments for each episode"
          - "Use the `segment_conversation` tool to validate your episode structure"

      tools_available:
        header: "### Tools Available"
        content: "You have access to:"
        items:
          - "`segment_conversation`: Validate and register conversation episodes"
          - "`bash_exec`: Execute shell commands (for timestamp generation)"
          - "`write_file`: Create the episode documentation markdown file"
          - "All other file system and process tools as needed"
        footer: "Now proceed with the episode analysis and documentation before answering the user's prompt."

  segmentation_instructions:
    # Always included in JSON input mode
    always_include_in_headless: true

    header:
      title: "Conversation Segmentation"
      content: |
        You have access to the `segment_conversation` tool for documenting conversation episodes. **IMPORTANT:** This tool does NOT automatically analyze conversations - YOU must do all the analysis yourself.

    sections:
      when_to_use:
        header: "### When to Use Segmentation"
        content: "Use conversation segmentation when:"
        items:
          - "User explicitly requests conversation analysis or segmentation"
          - "At the end of a session to document conversation structure"
          - "When creating summaries or documentation of the conversation flow"

      your_responsibility:
        header: "### YOUR RESPONSIBILITY: Analyze and Create Episodes"
        content: "**Before calling the tool, YOU MUST:**"
        steps:
          - step: 1
            title: "Analyze the conversation history yourself"
            items:
              - "Review ALL messages in the conversation chronologically"
              - "Identify natural task boundaries based on:"
              - "  - **Time gaps**: Significant pauses between messages (typically >30 minutes)"
              - "  - **Explicit topic switches**: User says \"let's work on X\", \"moving to Y\", \"new task\", \"switch to...\""
              - "  - **Context changes**: New files being edited, different commands, branch switches, different features"
              - "Group related messages into coherent task episodes"

          - step: 2
            title: "For each episode you identify, track"
            items:
              - "Start and end message indices (0-based)"
              - "Start and end timestamps (if available)"
              - "What triggered the boundary (time_gap, explicit_reset, context_switch, session_start)"
              - "Key context switches (file changes, branch changes, command changes)"
              - "Appropriate tags for categorization"
              - "Message count"

          - step: 3
            title: "Create episode objects with the required fields"
            items:
              - "`id`: Unique identifier (e.g., \"episode-1\", \"episode-2\", \"ep-setup\", etc.)"
              - "`title`: Clear, concise title summarizing the episode (e.g., \"Implement OAuth Flow\")"
              - "`summary`: Brief 1-2 sentence description of what was accomplished"

      how_to_use_tool:
        header: "### How to Use the Tool"
        content: "**The tool accepts an array of episodes you've created:**"
        example: |
          ```javascript
          segment_conversation({
            episodes: [
              {
                id: "episode-1",
                title: "Project Setup and Configuration",
                summary: "Initialized TypeScript project with oclif framework and configured linting"
              },
              {
                id: "episode-2",
                title: "Implement Authentication Flow",
                summary: "Added OAuth 2.0 authentication with PKCE flow and token management"
              },
              {
                id: "episode-3",
                title: "Create API Client Service",
                summary: "Built REST API client with retry logic and error handling"
              }
            ]
          })
          ```

        tool_returns: |
          **The tool will return:**
          ```javascript
          {
            episodes: [/* your episodes array */],
            totalEpisodes: 3
          }
          ```

          The tool simply validates your episodes and returns them with the total count. It does NOT add any additional metadata.

      creating_markdown:
        header: "### Creating the Episodes Markdown File"
        content: "After analyzing the conversation and calling the tool, you must:"
        steps:
          - step: 1
            title: "Get current timestamp for filename"
            content: |
              ```javascript
              bash_exec({
                command: "date +%Y%m%d-%H%M%S"
              })
              ```

          - step: 2
            title: "Build markdown content"
            content: "using the metadata YOU collected during analysis:"
            example_template: |
              ```markdown
              # Conversation Episodes

              **Generated:** YYYY-MM-DD HH:MM:SS
              **Total Episodes:** [N]
              **Session Duration:** [calculated from first to last message]

              ---

              ## Episode 1: [Title from your episode object]

              **Duration:** [start time] - [end time] ([X] minutes)  ← YOU calculate this from message timestamps
              **Messages:** [N] messages (indices [start]-[end])  ← YOU tracked these indices during analysis
              **Boundary Trigger:** [time_gap | explicit_reset | context_switch | session_start]  ← YOU determined this
              **Tags:** [tag1], [tag2]  ← YOU assigned these based on content

              ### Summary
              [Summary from your episode object]

              ### Context Switches (if any)
              - **File Change**: Switched from config/ to src/auth/
              - **Branch Change**: From main to feature/oauth-implementation
              - **Command Change**: From npm commands to git operations

              ### Key Actions
              [List major actions/changes in this episode based on your analysis]

              ---

              ## Episode 2: [Next episode title]

              [Continue for all episodes...]

              ---

              *Auto-generated by ByteRover CipherAgent*
              *Analysis performed by LLM, validated by segment_conversation tool*
              ```

          - step: 3
            title: "Write the file"
            content: |
              ```javascript
              write_file({
                filePath: ".brv/episodes/session-[timestamp]-episodes.md",
                content: [your formatted markdown]
              })
              ```

      complete_workflow_example:
        header: "### Complete Example Workflow"
        content: |
          ```javascript
          // STEP 1: Analyze conversation yourself
          // - You review messages 0-45 in the conversation
          // - You identify 3 distinct episodes based on topic changes and time gaps
          // - You note message indices, timestamps, triggers, context switches

          // STEP 2: Create episode objects with YOUR analysis
          const myEpisodes = [
            {
              id: "episode-1",
              title: "Initial Project Setup",
              summary: "Created project structure, initialized git, configured TypeScript and linting"
            },
            {
              id: "episode-2",
              title: "Implement Core Authentication",
              summary: "Built OAuth flow with PKCE, token refresh logic, and session management"
            },
            {
              id: "episode-3",
              title: "Add API Integration Layer",
              summary: "Created REST client with interceptors, retry logic, and error handling"
            }
          ]

          // STEP 3: Call tool to validate and register episodes
          const result = await segment_conversation({
            episodes: myEpisodes
          })
          // Returns: { episodes: [...], totalEpisodes: 3 }

          // STEP 4: Get timestamp for filename
          const timestamp = await bash_exec({
            command: "date +%Y%m%d-%H%M%S"
          })

          // STEP 5: Build markdown with ALL metadata from YOUR analysis
          // [See full markdown template in previous section]

          // STEP 6: Write markdown file
          await write_file({
            filePath: `.brv/episodes/session-${timestamp.trim()}-episodes.md`,
            content: markdown
          })
          ```

      critical_reminders:
        header: "### Critical Reminders"
        items:
          - "⚠️ **YOU must analyze the conversation** - the tool does NOT do automatic analysis"
          - "⚠️ **YOU must track all metadata** - message indices, timestamps, triggers, context switches"
          - "⚠️ **The tool only validates** - it returns what you give it plus a count"
          - "⚠️ **YOU must build the markdown** - include all the rich metadata from YOUR analysis"
          - "✅ Use the tool to formalize and validate your episode structure"
          - "✅ Episodes help document task boundaries and workflow patterns"
          - "✅ Be thorough in your analysis to create meaningful episode groupings"
