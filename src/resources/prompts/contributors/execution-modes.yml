version: "1.0"
prompt_id: "execution-modes"

# Execution mode-specific instructions that appear based on runtime context
# Each mode is triggered by specific context flags (e.g., isJsonInputMode)

modes:
  json_input_mode:
    # Triggered when context.isJsonInputMode === true
    trigger: "isJsonInputMode"
    always_include_in_headless: true

    header:
      title: "CRITICAL: JSON Input Mode - Autonomous Execution Required"
      critical: true
      content: |
        You are currently in HEADLESS execution mode with an imported conversation history.
        This conversation was imported from an external source (Agentic Coding IDE).

    sections:
      autonomous_execution:
        header: "### AUTONOMOUS EXECUTION MODE - NO QUESTIONS ALLOWED"
        content: |
          **CRITICAL RULES:**
          - This is HEADLESS mode - there is NO user interaction capability
          - DO NOT ask for clarification, confirmation, or additional information
          - DO NOT present options and wait for user choice
          - NEVER output questions like "Do you want to..." or "Would you like me to..."
          - Make autonomous decisions based on the conversation history
          - Execute the user's latest request directly and completely
          - If multiple interpretations exist, choose the most reasonable one based on context
          - Provide direct results, not questions or proposals

      mandatory_first_task:
        header: "### MANDATORY FIRST TASK: Domain Knowledge Detection"
        content: |
          Before answering the user's latest prompt, you MUST complete domain detection and create documentation:
        steps:
          - step: 1
            title: "Analyze JSON data and detect domains"
            content: "Review the conversation JSON data, identify knowledge patterns, and classify into domains (see Domain Knowledge Detection section below for detailed instructions and categories)"

          - step: 2
            title: "Call detect_domains tool"
            content: "Validate your detected domains using the `detect_domains` tool with the original content and your domain objects"

          - step: 3
            title: "Create documentation file"
            content: |
              ```javascript
              // Get timestamp
              const timestamp = await bash_exec({ command: "date +%Y%m%d-%H%M%S" })
              
              // Build markdown with your analyzed domains (see Domain Knowledge Detection section for template)
              // Write file
              await write_file({
                filePath: `.brv/domains/session-${timestamp.trim()}-domains.md`,
                content: markdown
              })
              ```

          - step: 4
            title: "Execute user's request"
            content: "After creating the documentation file, proceed to answer the user's latest prompt AUTONOMOUSLY"

      executing_user_request:
        header: "### EXECUTING THE USER'S REQUEST"
        content: "After creating the documentation file, you MUST:"
        points:
          - "**Execute Directly - No Questions:** Read the user's latest prompt from the conversation, execute it immediately without asking for confirmation, make all necessary decisions autonomously, complete the task fully in one response"
          - "**Decision Making:** Use conversation history to understand context and intent, if the request is ambiguous choose the most logical interpretation, if creating new entities use reasonable defaults based on patterns in the conversation, apply coding conventions and patterns observed in the conversation history"
          - "**Output Format:** Provide direct results and confirmations, show what was created/modified/executed, NO questions, NO \"Do you want...\", NO waiting for approval, just execute and report what was done"

  domain_detection_instructions:
    # Always included in JSON input mode
    always_include_in_headless: true

    header:
      title: "Domain Knowledge Detection"
      content: |
        **IMPORTANT:** The `detect_domains` tool does NOT automatically analyze or detect domains - YOU must do all the analysis yourself. The tool only validates your domain classifications and returns summary statistics.

    sections:
      your_responsibility:
        header: "### YOUR RESPONSIBILITY: Analyze and Detect Domains"
        content: "**Before calling the tool, YOU MUST:**"
        steps:
          - step: 1
            title: "Analyze the JSON data content yourself"
            items:
              - "Review ALL the JSON data provided"
              - "Identify knowledge patterns matching domain categories (predefined or custom)"
              - "Extract relevant snippets as evidence for each classification"
              - "Determine confidence scores (0-1) based on evidence strength"

          - step: 2
            title: "Create domain objects"
            items:
              - "`category`: Domain name (predefined or custom - see categories below)"
              - "`description`: Brief description of the domain knowledge"
              - "`confidence`: Score 0.0-1.0 (>= 0.7 is high confidence)"
              - "`snippets` (optional): Array of supporting text snippets"
              - "`reasoning` (optional): Explanation for classification (recommended for custom categories)"

          - step: 3
            title: "Call detect_domains tool"
            content: "Pass the original content and your detected domains array to validate and get summary statistics"

      domain_categories:
        header: "### Domain Categories"
        content: |
          **Predefined Categories (use when appropriate):**
          - **STYLE_GUIDE**: Code formatting rules, style standards, best practices
          - **ARCHITECTURE_DECISION**: ADRs, architectural choices, design rationale
          - **NAMING**: Naming conventions, identifier patterns, terminology
          - **WORKFLOW**: Development processes, CLI flows, Git workflows
          - **TROUBLESHOOTING**: Debugging patterns, error resolution, common issues
          - **PERFORMANCE**: Optimization tips, performance notes, profiling insights
          - **PLAN**: Implementation plans, task breakdowns, structured procedures
          - **PITFALL**: Gotchas, anti-patterns, "watch out" warnings

          **Custom Categories (ENCOURAGED when predefined don't fit):**
          Create your own category names (e.g., `SECURITY_PATTERN`, `DATA_MODEL`, `API_CONTRACT`) when predefined categories don't accurately capture the knowledge domain. Provide clear reasoning in the `reasoning` field.

      example:
        header: "### Example"
        example: |
          ```javascript
          detect_domains({
            content: "The original JSON data being analyzed",
            domains: [
              {
                category: "ARCHITECTURE_DECISION",
                description: "Decision to use event-driven architecture",
                confidence: 0.9,
                snippets: ["We chose event sourcing because...", "CQRS pattern"],
                reasoning: "Multiple references to architectural decisions"
              },
              {
                category: "SECURITY_PATTERN",
                description: "JWT token validation best practices",
                confidence: 0.88,
                snippets: ["Always validate signatures", "Use secure storage"],
                reasoning: "Custom category for security-specific patterns"
              }
            ]
          })
          ```

        tool_returns: |
          Returns: `{ content: "...", domains: [...], summary: { totalDomains: N, highConfidenceDomains: N } }`

      markdown_template:
        header: "### Markdown File Template"
        example_template: |
          ```markdown
          # Domain Knowledge Analysis

          **Generated:** YYYY-MM-DD HH:MM:SS
          **Total Domains:** [N]
          **High-Confidence Domains:** [N with confidence >= 0.7]

          ---

          ## Domain: [Category Name]

          **Confidence:** [0.0-1.0]
          **Description:** [Brief description]

          ### Reasoning
          [Why this was classified in this domain]

          ### Supporting Evidence
          ```
          [Snippet 1]
          [Snippet 2]
          ```

          ### Key Insights
          - [Insight 1]
          - [Insight 2]

          ---
          [Repeat for all domains...]

          ## Summary Statistics
          - **Total Domains:** [N]
          - **High Confidence (>= 0.7):** [N]
          - **Medium Confidence (0.4-0.69):** [N]
          - **Low Confidence (< 0.4):** [N]
          - **Custom Categories:** [list custom category names]

          ---
          *Auto-generated by ByteRover CipherAgent - Domain Detection*
          ```

      critical_reminders:
        header: "### Critical Reminders"
        items:
          - "⚠️ **YOU must analyze** - the tool does NOT do automatic detection"
          - "⚠️ **YOU must classify** - identify patterns, extract snippets, assess confidence"
          - "⚠️ **Tool only validates** - returns what you give it plus statistics"
          - "✅ **Use CUSTOM categories** when predefined ones don't fit"
          - "✅ **Provide clear reasoning** for custom categories"
          - "✅ **Include confidence scores** based on evidence strength"
