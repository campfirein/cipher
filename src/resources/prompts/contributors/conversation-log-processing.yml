version: "1.0"
prompt_id: "conversation-log-processing"

# Conversation Log Processing Instructions
# Defines how to parse and extract information from JSON conversation logs

sections:
  header:
    content: |
      ## CONVERSATION LOG PROCESSING

  json_format_understanding:
    header: "### JSON Format Understanding"
    content: |
      The input is a **JSON-formatted conversation log** with this structure:

      ```json
      {
        "id": "<conversation_id>",
        "title": "<conversation_title>",
        "type": "<conversation_type>",
        "timestamp": <unix_timestamp>,
        "workspacePaths": ["<path1>", "<path2>", ...],
        "messages": [
          {
            "type": "user" | "assistant",
            "timestamp": "<iso_timestamp>",
            "turn_id": <number>,
            "content": [
              {
                "type": "text",
                "text": "<message content>"
              },
              {
                "type": "thinking",
                "thinking": "<internal reasoning>"
              },
              {
                "type": "tool_use",
                "tool_use_id": "<unique_id>",
                "id": "<tool_id>",
                "name": "<tool_name>",
                "input": {
                  "<parameter_name>": <parameter_value>,
                  "relativeWorkspacePath": "<optional_workspace_path>"
                },
                "output": {
                  "type": "tool_result",
                  "content": <output_content>
                }
              }
            ]
          }
        ]
      }
      ```

  format_elements:
    header: "### Format Elements"
    steps:
      - step: 1
        title: "Top-Level Metadata"
        content: |
          - `id`: Unique conversation identifier
          - `title`: Conversation title/summary
          - `type`: Conversation type (e.g., "Cursor")
          - `timestamp`: Unix timestamp
          - `workspacePaths`: Array of workspace paths involved
      - step: 2
        title: "Messages Array"
        content: |
          - Each message has `type` ("user" or "assistant"), `timestamp`, `turn_id`, and `content` array
          - `turn_id`: Sequential number indicating conversation turn
      - step: 3
        title: "Content Types"
        content: |
          - `type: "text"`: Regular message content (`text` field)
          - `type: "thinking"`: Internal reasoning (`thinking` field) - extract insights from this
          - `type: "tool_use"`: Tool invocation with:
            - `name`: Tool name (e.g., "read_file", "search_replace", "list_dir")
            - `input`: Tool parameters (may include `relativeWorkspacePath` for multi-workspace scenarios)
            - `output`: Tool result with `type: "tool_result"` and `content`
      - step: 4
        title: "Tool Output Structure"
        content: |
          - `read_file`: Output `content` contains full file contents (string)
          - `search_replace`: Output `content` contains object with `diff` (chunks with old/new lines), `contentsAfterEdit` (full file after edit)
          - `list_dir`: Output `content` contains object with `directoryTreeRoot` showing nested directory structure
          - `read_lints`: Output `content` contains linting information
          - `run_terminal_cmd`: Output `content` contains command output (string)
          - Other tools: Extract relevant information from `content` field based on tool type

  extracting_information:
    header: "### Extracting Information"
    content: |
      Process the JSON conversation log by iterating through the `messages` array:

      1. **User Messages** (`type: "user"`):
         - Extract text content from `content` array items with `type: "text"`
         - Identify the user's request or instruction
         - Note file paths, code references, or specific requirements mentioned
         - Pay attention to `workspacePaths` to understand which workspaces are involved

      2. **Assistant Messages** (`type: "assistant"`):
         - Extract text content from `content` array items with `type: "text"`
         - Extract thinking/reasoning from `content` array items with `type: "thinking"` - these often contain valuable insights
         - Look for technical decisions, patterns, or insights shared
         - Note any code examples or explanations provided
         - Use `turn_id` to understand conversation flow and progression

      3. **Tool Calls** (`content` items with `type: "tool_use"`):
         - **`read_file`**: Files that were read (indicates what was examined)
           - Extract file path from `input.targetFile` or `input.path`
           - Extract full file contents from `output.content` (string)
           - Note `input.relativeWorkspacePath` if present (multi-workspace scenarios)
         - **`search_replace`**: Files that were modified
           - Extract file path from `input.relativeWorkspacePath` or `input.path`
           - Extract diff information from `output.content.diff` (shows what changed)
           - Extract full file after edit from `output.content.contentsAfterEdit`
           - Note what changed and why (from surrounding text/thinking content)
         - **`write_file`**: Files that were created
           - Extract file path from `input.path` or `input.file_path`
           - Extract new file contents from `output.content`
           - Note `input.relativeWorkspacePath` if present
         - **`list_dir`**: Directory exploration
           - Extract directory path from `input.targetDirectory`
           - Extract directory structure from `output.content.directoryTreeRoot`
           - Note file counts and extension distributions
         - **`run_terminal_cmd`**: Commands executed
           - Extract command from `input.command`
           - Extract command output from `output.content` (string)
           - Note what operations were performed
         - **`read_lints`**: Linting information
           - Extract linting results from `output.content`
           - Note which files had linting issues
         - **Other tools**: Extract relevant information based on tool name and structure

  identifying_tasks:
    header: "### Identifying Tasks"
    content: |
      Look for these patterns in the JSON structure to identify tasks:

      1. **File Operations**:
         - Creating new files: Look for `tool_use` with `name: "write_file"` or `name: "write"`
         - Modifying existing files: Look for `tool_use` with `name: "search_replace"` or `name: "edit_file"`
         - Reading files: Look for `tool_use` with `name: "read_file"` (may indicate preparation for changes)
         - File paths appear in `input` objects of tool calls

      2. **Code Changes**:
         - New implementations: Full code in `output.content` from `write_file` tools
         - Bug fixes or improvements: Compare `output.content.diff` from `search_replace` tools
         - Refactoring: Multiple `search_replace` or `write_file` calls across different files
         - Configuration changes: Config files modified (package.json, pyproject.toml, etc.)

      3. **Documentation Updates**:
         - README updates: `search_replace` or `write_file` on README.md files
         - Code comments: Changes in code files with comment updates
         - Architecture documentation: New or updated documentation files
         - Best practices: Content in assistant text messages or thinking blocks

      4. **Configuration Changes**:
         - Dependencies: Changes to package.json, requirements.txt, pyproject.toml, etc.
         - Build configuration: Changes to Makefile, Dockerfile, docker-compose.yml, etc.
         - Environment setup: Changes to .env files or environment configuration

      5. **Task Completion**:
         - Look for patterns in assistant messages describing completed work
         - Match tool calls with assistant explanations in preceding/following messages
         - Extract what was accomplished from `thinking` content blocks
         - Note conversation progression through `turn_id` values

