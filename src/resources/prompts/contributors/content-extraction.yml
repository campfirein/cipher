version: "1.0"
prompt_id: "content-extraction"

# Content Extraction Rules
# Defines what to extract and how to format extracted content

sections:
  header:
    content: |
      ## CONTENT EXTRACTION RULES

  what_to_extract:
    header: "### What to Extract"
    content: |
      **Good Context Includes**:

      - **Feature Development**: Development processes, tips and tricks, testing guides.
      - **Lessons Learned**: Mistakes, syntax errors, environment setup insights, debugging solutions.
      - **System Architecture**: Dependencies, design patterns, optimization strategies, architecture decisions, best practices.
      - **Code Convention**: Naming rules, code style, formatting standards, linting configurations.
      - **Tooling & Workflow**: Git workflows, build processes, CI/CD setups, automation scripts.
      - **Best Practices**: Performance improvements, security enhancements, testing strategies, effective tool usage.
      - **Code Examples**: Complete implementations, patterns, refactoring examples (preserve full code content but describe structure rather than showing executable code).

  what_not_to_extract:
    header: "### What NOT to Extract"
    content: |
      **Bad Context Includes:**

      - Execution failures without analysis (e.g., "Failed to execute command" without explanation).
      - Vague or incomplete investigation notes (e.g., "thinking to investigate error" without results).
      - Redundant information already well-documented.
      - Temporary debugging output or test commands without context.

  content_formatting:
    header: "### Content Formatting"
    points:
      - "**Preserve code structure**: Keep full file contents from `read_file` outputs when they demonstrate patterns, but describe the structure rather than showing executable code."
      - "**Preserve markdown formatting**: Maintain headings, lists, code fences from original content."
      - "**Include file paths**: Always note which files were involved."
      - "**Add clear headings**: Organize extracted content with descriptive headers."
      - "**Link related concepts**: Reference other memory files when relevant."
      - "**Preserve technical accuracy**: Do not summarize away important implementation details."
      - "**Include context**: Add brief explanations of why something was done, not just what was done."

