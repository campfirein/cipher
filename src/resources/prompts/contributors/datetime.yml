version: "1.0"
prompt_id: "datetime"

# Date and time formatting template
# Provides current temporal context to the LLM

format:
  # Template for datetime output
  # Variables: {{timestamp}} - ISO 8601 formatted datetime
  template: "<dateTime>Current date and time: {{timestamp}}</dateTime>"

  # Whether to wrap in XML tags
  useXmlTags: true

  # Tag name if using XML tags
  xmlTag: "dateTime"

  # Prefix text before timestamp
  prefix: "Current date and time: "
