version: "1.0"
prompt_id: "memory"

# Memory formatting configuration
# Defines how agent memories are displayed in the system prompt

formatting:
  # Header for the memories section
  header: "## Agent Memories"

  # Template for individual memory items
  # Variables:
  #   {{content}} - Memory content
  #   {{tags}} - Comma-separated tags (if includeTags is true)
  #   {{updatedAt}} - Formatted update date (if includeTimestamps is true)
  itemTemplate: "- {{content}}"

  # Template when tags are included
  # Variables: {{content}}, {{tags}}
  itemWithTagsTemplate: "- {{content}} [Tags: {{tags}}]"

  # Template when timestamp is included
  # Variables: {{content}}, {{updatedAt}}
  itemWithTimestampTemplate: "- {{content}} (Updated: {{updatedAt}})"

  # Template when both tags and timestamp are included
  # Variables: {{content}}, {{tags}}, {{updatedAt}}
  itemWithBothTemplate: "- {{content}} [Tags: {{tags}}] (Updated: {{updatedAt}})"

  # Empty state message (when no memories found)
  emptyMessage: ""  # Return empty string for graceful degradation

  # Date format for timestamps (used with Date.toLocaleDateString())
  dateFormat: "default"  # Can be: "default", "short", "medium", "long", "full"
