version: "1.0"
prompt_id: "final-instructions"

# Final Instructions and Expected Behavior
# Provides step-by-step instructions and expected outcomes

sections:
  header:
    content: |
      ## FINAL INSTRUCTIONS

  parsing_instructions:
    header: "1. Parse the JSON conversation log"
    points:
      - "Read the top-level metadata: `id`, `title`, `workspacePaths` to understand context"
      - "Iterate through the `messages` array in order (use `turn_id` to track progression)"
      - "For each message, process all items in the `content` array"

  extraction_instructions:
    header: "2. Extract information systematically"
    points:
      - "Extract user requests from `type: \"user\"` messages with `type: \"text\"` content"
      - "Extract assistant explanations from `type: \"assistant\"` messages with `type: \"text\"` content"
      - "Extract valuable insights from `type: \"thinking\"` content blocks"
      - "Extract tool call information from `type: \"tool_use\"` content items"
      - "Pay attention to `relativeWorkspacePath` in tool inputs for multi-workspace scenarios"

  identification_instructions:
    header: "3. Identify all tasks and technical information worth preserving"
    points:
      - "File operations (create, modify, read)"
      - "Code changes and patterns"
      - "Documentation updates"
      - "Configuration changes"
      - "Architecture decisions"
      - "Best practices and lessons learned"

  checking_instructions:
    header: "4. Check existing memory files before creating new ones"
    points:
      - "Use `glob-files-tool` to explore relevant directories in `.brv/contexts`"
      - "Use `grep-content-tool` to find related content in existing memory files"
      - "Use `read-file-tool` to read existing files that might need updates"

  creation_instructions:
    header: "5. Create organized memory files in `.brv/contexts`"
    points:
      - "Use `write-file-tool` for new markdown files (with `create_directories: true` to create subdirectories)"
      - "Use `edit-file-tool` for updates (ensure `old_string` is unique and includes sufficient context)"
      - "Always read existing files first before editing"
      - "Format as markdown with clear headings, code blocks, and organized sections"

  organization_instructions:
    header: "6. Organize information according to the directory structure"
    points:
      - "**Project_Structure/**: Architecture decisions, folder layouts, module organization, system design"
      - "**Coding_Convention/**: Code style, naming rules, design patterns, coding standards"
      - "**Tooling_and_Workflow/**: Git workflows, build processes, CI/CD, development tools, configuration"
      - "**Best_Practices/**: Performance, security, testing strategies, general best practices"
      - "**Best_Thinking_Practices/**: Problem-solving approaches, decision-making patterns, creative thinking"
      - "**Tool_Usage/**: Tool-specific usage patterns and memory management"
      - "**Archive/**: Deprecated or outdated information"

  preservation_instructions:
    header: "7. Preserve technical accuracy"
    points:
      - "Include structural descriptions of code examples when they demonstrate patterns"
      - "Focus on patterns and decisions rather than full executable code"
      - "Preserve markdown formatting and file paths"
      - "Include context about why something was done"

  reporting_instructions:
    header: "8. Report your actions after completing file operations"
    points:
      - "Summarize what was created/modified/deleted"
      - "Note which memory files were updated and why"

  expected_behavior:
    header: "## EXPECTED BEHAVIOR"
    content: |
      After reading the JSON conversation log:

      1. **Extract valuable technical context** from:
         - Assistant messages (text and thinking blocks)
         - Tool calls showing file operations, code changes, and configurations
         - User requests that led to technical decisions
         - Patterns, best practices, and lessons learned

      2. **Create organized markdown files** in `.brv/contexts`:
         - Place files in appropriate subdirectories based on content type
         - Use descriptive filenames (e.g., `testing.md`, `clean-architecture.md`, `refactoring-patterns.md`)
         - Structure content with clear headings and sections
         - Include file paths, code structure descriptions, and context

      3. **Update existing files** when adding related information:
         - Check for existing memory files on similar topics
         - Add new sections rather than creating duplicate files
         - Maintain consistency in formatting and organization

      Now process the provided JSON conversation log, extract good context, and create organized memory files in `.brv/contexts`.
