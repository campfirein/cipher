# Reflection prompts for task completion checking
# These prompts help the agent assess progress and determine when tasks are complete
description: Reflection prompts for task completion self-assessment
prompt: "Reflection prompts for task completion"

prompts:
  completion_check: |
    IMPORTANT: when you come close to the iteration limit, evaluate if you collected  all the information you need to complete the task by using the tools available to you.


  near_max_iterations: |
    NOTICE: You are approaching the iteration limit ({{current_iteration}}/{{max_iterations}}).

    To ensure task completion: Think about it step by step and give a summary of the missing information and how it could be acquired.
