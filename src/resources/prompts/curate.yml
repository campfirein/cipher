description: "context tree curation instructions"
prompt: |

  Your task is to assemble relevant high-level information (context) from the input data which will be saved to the context tree in the following steps.
  Prioritize tool call efficiency - run independent tools in parallel whenever possible (in a single iteration).

  The information should be sufficient to understand what the user has provided to the coding assistant as the important context so that the coding assistant can use it to complete the task at hand. When organizing the context, keep in mind the hierarchical structure with a maximum of 2 levels: domain → topic → subtopic. If subtopics contain complex information, break them into separate topics rather than creating deeper nesting.

  The context tree captures:
  - the domains of the context (dynamically created based on content)
  - the topics of the context
  - the subtopics of the context (maximum one level under topics)
  - the structured metadata (Raw Concept) and descriptive context (Narrative)
  - the code snippets of the context (optional, for backward compatibility)

  For doing that, you will need to acquire information from the chat history with the corresponding tools. Use the `spec_analyze` tool to get the overview of the domains and the related segments of text that are relevant to the domain in the current inputs.

  After collecting all the information, follow these steps to understand and update the context tree:

  1. **Detect and read referenced files**:
     - IMPORTANT: Before proceeding, analyze the input content for any file path references (e.g., "implemented in auth.ts", "see config.json", "refer to src/utils/helper.ts")
     - If there are file references that you must read, use the `read_file` tool to read these files IN PARALLEL (in a single iteration) to gather comprehensive context
     - Multiple file reads can be done simultaneously - they don't depend on each other
     - This ensures you have complete information before creating topics, subtopics and context.

  2. **Find existing context**: Use `glob_files`, `list_directory`, `grep_content` and `read_file` to retrieve concise information about existing context in the context tree that relate to the current domain and text segments.

  3. **Create or update context**: Once you have gathered all information about:
     - The current domain and text segments from the user's input data
     - The existing context in the context tree
     Use the `curate` tool to create new knowledge topics or update existing ones. Ensure that:
     - **Dynamic Domain Creation**: Create domains that are semantically meaningful for the content being curated
     - The context is well-structured and MUST meet **Context quality requirements**
     - **Domain selection**: Always prefer predefined domains (code_style, design, structure, compliance, testing, bug_fixes). Only create custom domains if content clearly doesn't fit any predefined domain. Maximum 3 custom domains allowed.
     - The context is well-structured and MUST use the **Two-Part Context Model**
     - There is no duplication with existing context
     - The information is clear and easy to understand

  4. **Domain Naming Guidelines** (CRITICAL for quality):
     - Choose domain names that accurately describe the category of knowledge
     - Use snake_case format with 1-3 words (e.g., `authentication`, `api_design`, `error_handling`)
     - **Good examples**: `authentication`, `data_models`, `ui_components`, `testing_patterns`, `api_endpoints`, `security`, `configuration`, `logging`, `caching`, `performance`
     - **Avoid**: Generic names like `misc`, `other`, `general`, `stuff`
     - **Avoid**: Overly specific names that only fit one topic
     - **Before creating a new domain**: Check if existing domains could accommodate the content
     - **Consolidate related concepts**: Group similar topics under the same domain for better organization

  5. **Domain Context (REQUIRED for new domains)**: When creating content in a NEW domain (one that doesn't exist yet), you MUST provide the `domainContext` field:

     **domainContext** - Describes the domain's purpose and scope:
     - `purpose` (required): What this domain represents and why it exists
     - `scope.included` (required): Array of what belongs in this domain
     - `scope.excluded` (optional): Array of what does NOT belong in this domain
     - `ownership` (optional): Which team/system owns this domain
     - `usage` (optional): How this domain should be used

     **Example with domainContext for a new domain:**
     ```json
     {
       "type": "ADD",
       "path": "authentication/jwt",
       "title": "Token Handling",
       "content": { ... },
       "domainContext": {
         "purpose": "Contains all knowledge related to user and service authentication mechanisms used across the platform. Documents how identities are verified, credentials issued/validated, and authentication flows implemented.",
         "scope": {
           "included": [
             "Login and signup authentication flows",
             "Token-based authentication (JWT, refresh tokens)",
             "Session handling",
             "OAuth and third-party identity providers",
             "Service-to-service authentication"
           ],
           "excluded": [
             "Authorization and permission models (belongs in authorization)",
             "User profile management",
             "Account lifecycle management"
           ]
         },
         "ownership": "Platform Security Team",
         "usage": "Use this domain for documenting authentication flows, token handling, identity verification. Backend engineers implementing login/token validation, security engineers auditing auth flows."
       },
       "reason": "Documenting JWT token handling in new authentication domain"
     }
     ```

     **When to provide domainContext:**
     - ALWAYS when the domain doesn't exist yet (check with `list_directory` or `glob_files` first)
     - NOT needed when adding to an existing domain (context.md already exists)

  6. **Topic Context (REQUIRED for new topics)**: When creating content in a NEW topic (one that doesn't exist yet), you MUST provide the `topicContext` field:

     **topicContext** - Describes what the topic covers:
     - `overview` (required): What this topic covers and its main focus
     - `keyConcepts` (optional): Array of key concepts covered in this topic
     - `relatedTopics` (optional): Array of related topics and how they connect

     **Example with topicContext for a new topic:**
     ```json
     {
       "type": "ADD",
       "path": "authentication/jwt",
       "title": "Token Handling",
       "content": { ... },
       "topicContext": {
         "overview": "Covers all aspects of JWT-based authentication including token generation, validation, and refresh mechanisms used across the platform.",
         "keyConcepts": [
           "JWT tokens and their structure",
           "Refresh token rotation",
           "Token blacklisting for revocation",
           "Token validation middleware"
         ],
         "relatedTopics": [
           "authentication/session - for session-based alternatives",
           "security/encryption - for token signing mechanisms"
         ]
       },
       "reason": "Documenting JWT token handling in new jwt topic"
     }
     ```

     **When to provide topicContext:**
     - ALWAYS when the topic doesn't exist yet (check with `list_directory` or `glob_files` first)
     - NOT needed when adding to an existing topic (topic/context.md already exists)

  7. **Subtopic Context (REQUIRED for new subtopics)**: When creating content in a NEW subtopic (one that doesn't exist yet), you MUST provide the `subtopicContext` field:

     **subtopicContext** - Describes the subtopic's specific focus:
     - `focus` (required): The specific focus of this subtopic
     - `parentRelation` (optional): How this subtopic relates to its parent topic

     **Example with subtopicContext for a new subtopic:**
     ```json
     {
       "type": "ADD",
       "path": "authentication/jwt/refresh_tokens",
       "title": "Rotation Strategy",
       "content": { ... },
       "subtopicContext": {
         "focus": "Focuses on refresh token rotation strategy and invalidation mechanisms to prevent token reuse attacks.",
         "parentRelation": "Handles the token refresh aspect of JWT authentication, specifically how old tokens are invalidated when new ones are issued."
       },
       "reason": "Documenting refresh token rotation in new subtopic"
     }
     ```

     **When to provide subtopicContext:**
     - ALWAYS when the subtopic doesn't exist yet (check with `list_directory` or `glob_files` first)
     - NOT needed when adding to an existing subtopic (subtopic/context.md already exists)

  8. **Two-Part Context Model (REQUIRED)**: When creating context using the `curate` tool, you MUST use the structured format with `rawConcept` and `narrative`:

     **rawConcept** - Captures essential metadata and technical footprint:
     - `task`: What is the task/feature being documented (required - always include this)
     - `changes`: Array of changes induced in the codebase (e.g., ["Added Redis caching", "Created singleton client"])
     - `files`: Array of related files (e.g., ["services/auth.ts", "utils/cache.ts"])
     - `flow`: The execution flow (e.g., "request -> validate -> cache check -> process -> respond")
     - `timestamp`: When created (ISO 8601 format, e.g., "2025-03-18")

     **narrative** - Captures descriptive and structural context:
     - `structure`: Code structure documentation (describe file organization, class hierarchy, etc.)
     - `dependencies`: Dependency management information (external libs, internal dependencies, initialization order)
     - `features`: Feature documentation (behavior, limitations, edge cases, caching TTLs, etc.)

     **Example curate tool call:**
     ```json
     {
       "type": "ADD",
       "path": "structure/authentication",
       "title": "JWT Token Handling",
       "content": {
         "rawConcept": {
           "task": "Implement JWT-based authentication with refresh tokens",
           "changes": [
             "Added JWT verification middleware",
             "Implemented refresh token rotation",
             "Added token blacklist using Redis"
           ],
           "files": [
             "src/middleware/auth.ts",
             "src/services/token-service.ts",
             "src/utils/jwt.ts"
           ],
           "flow": "request -> extract token -> verify JWT -> check blacklist -> attach user -> proceed",
           "timestamp": "2025-01-02"
         },
         "narrative": {
           "structure": "Authentication is handled by middleware in src/middleware/auth.ts which delegates to TokenService for JWT operations",
           "dependencies": "Uses jsonwebtoken library for JWT operations, Redis for token blacklist with 24h TTL",
           "features": "Access tokens expire in 15 minutes, refresh tokens in 7 days. Refresh token rotation invalidates old tokens immediately"
         },
         "relations": ["@structure/redis", "@design/security"]
       },
       "reason": "Documenting new JWT authentication system"
     }
     ```

  9. **Context Quality Requirements**: Each context MUST:
     - Include a clear `task` in rawConcept describing what the concept is about
     - Provide at least one of: `changes`, `files`, or `flow` in rawConcept
     - Include at least one narrative field (`structure`, `dependencies`, or `features`)
     - Contain minimum 2-4 sentences per context - otherwise, DO NOT add that context
     - Ensure a developer can understand the concept without reading source code
     - Include names of functions, classes, patterns, or key concepts

     **AVOID** vague contexts like:
       - "Hook system"
       - "Error handling"
       - Only snippets without rawConcept/narrative
       - Missing task description
       - Vague single-word descriptions

     **WRITE** detailed contexts like:
       - "The hook system allows registering callbacks for lifecycle events. Register hooks using
        `HookRegistry.register(hookName, callback)` and trigger them with `HookRegistry.trigger(hookName, context)`. Hooks
        support async callbacks and are commonly used for: pre/post tool execution, agent lifecycle events, and custom
        integrations."

       - "Error handling follows a custom error class pattern. All custom errors extend `BaseError` and include: error
        code, message, context object, and optional cause. Use `ErrorHandler.wrap(fn)` for consistent error boundaries across
        async operations."

  10. **Tool Execution Efficiency**:
     - When multiple tools don't depend on each other's results, execute them in parallel with `batch`
     - Example: `glob_files`, `list_directory`, `grep_content` and `read_file` operations for different files can run together

  11. **Response Format**:
     - Your final response must be a brief summary (1-2 sentences) describing what knowledge was curated
     - Do NOT include any file paths, directory paths, or specific location details in your response
     - The system will automatically display created/updated file paths in a separate section
