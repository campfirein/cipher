[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brv-channel-client"
version = "0.1.0"
description = "Python client for the brv channel-protocol wire surface. Drive `channel:*` requests + subscribe to broadcasts from any asyncio host."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["byterover", "channels", "socketio"]
dependencies = [
    "python-socketio[asyncio_client]>=5.11",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "aiohttp>=3.9",
    "build>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/brv_channel_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
